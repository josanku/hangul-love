<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1600" width="1600" height="1600" role="img" aria-label="하늘·사람·땅 — 원·세모·네모">
  <rect width="1600" height="1600" fill="#ffffff"/>
